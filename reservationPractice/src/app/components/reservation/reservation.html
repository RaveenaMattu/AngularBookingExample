<div id="content">
  <h2>RESERVATION AREAS</h2>
  <!-- <span>{{reservationCount()}}</span> -->
  <table class="table">
    <thead>
      <tr>
        <th scope="col">Res. Id</th>
        <th scope="col">Res. Name</th>
        <th scope="col">Res. Time</th>
        <th scope="col">Status</th>
      </tr>
    </thead>
    <tbody>
      @for (reservation of reservations; track $index; let i = $index) {
        <tr class="tRow">
          <td>RES 0{{ i + 1 }}</td>
          <td>{{ reservation.rName }}</td>
          <td>{{ reservation.rTime }}</td>
          <td>
            <label>
              <input
                type="checkbox"
                [checked]="reservation.isBooked"
                (change)="toggleReservation(i)"
              />
              {{ reservation.isBooked ? 'Booked' : 'Available' }}
            </label>
          </td>
        </tr>
      }
    </tbody>
  </table>

  <button class="btn btn-dark" id="addBtn" (click)="openModal(addReservationModal)">
    Add Reservation
  </button>
</div>

<ng-template #addReservationModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Add Reservation</h5>
    <button class="btn-close" (click)="modal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <form>
      <input
        type="text"
        class="form-control"
        #nameInput
        placeholder="Enter Reservation Name"
        required
      />

      <select class="form-control mt-4" #slot>
        <option value="" style="color: #bababa" disabled selected>Choose Time Slot</option>
        <option value="9am - 12noon">9am - 12noon</option>
        <option value="12noon - 3pm">12noon - 3pm</option>
        <option value="3pm - 6pm">3pm - 6pm</option>
      </select>
      <div class="form-check mt-4">
        <input type="checkbox" class="form-check-input" #bookedInput />
        <label class="form-check-label ms-2">Booked</label>
      </div>
    </form>
  </div>

  <div class="modal-footer">
    <button class="btn btn-secondary" (click)="modal.close()">Close</button>

    <button
      class="btn btn-dark"
      (click)="addReservation(nameInput.value, slot.value,  bookedInput.checked); modal.close()"
    >
      Add Reservation
    </button>
  </div>
</ng-template>
